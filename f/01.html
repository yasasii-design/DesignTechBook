<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>図版参照</title>
    <style>
        /* 画面いっぱいに画像を表示し、背景を落ち着いた色にする設定 */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a; /* 画像のコントラストを邪魔しない暗めの背景 */
        }
        img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); /* 境界線をわかりやすくする */
        }
    </style>
</head>
<body>
    <img src="../img/01.png" alt="RGB版図版">
</body>
</html>
